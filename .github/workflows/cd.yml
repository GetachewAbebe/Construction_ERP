name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [ "main" ]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
      CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
      CPANEL_DOMAIN: ${{ secrets.CPANEL_DOMAIN }}
      REPO_ROOT: /home/natanewn/repositories/Construction_ERP

    steps:
      - name: Trigger CPanel deployment
        run: |
          RESPONSE=$(curl -s -o /tmp/deploy_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: cpanel ${CPANEL_USERNAME}:${CPANEL_API_TOKEN}" \
            -d "repository_root=${REPO_ROOT}" \
            "https://${CPANEL_DOMAIN}:2083/execute/VersionControlDeployment/create")

          echo "Deploy HTTP status: $RESPONSE"
          cat /tmp/deploy_response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "Deployment failed with HTTP $RESPONSE"
            exit 1
          fi

          echo "Deployment triggered successfully."
