name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [ "main" ]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger deployment webhook
        run: |
          PAYLOAD='{"ref":"refs/heads/main"}'
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | awk '{print $2}')"

          RESPONSE=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: ${SIGNATURE}" \
            -d "$PAYLOAD" \
            "https://erp.natanemengineering.com/deploy-webhook.php")

          echo "HTTP status: $RESPONSE"
          cat /tmp/webhook_response.txt

          if [ "$RESPONSE" != "200" ]; then
            echo "Webhook failed with HTTP $RESPONSE"
            exit 1
          fi
