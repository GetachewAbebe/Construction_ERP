name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [ "main" ]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
      CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
      CPANEL_DOMAIN: ${{ secrets.CPANEL_DOMAIN }}

    steps:
      - name: Trigger CPanel Git Pull & Deploy
        run: |
          RESPONSE=$(curl -s -o /tmp/cpanel_response.json -w "%{http_code}" \
            -H "Authorization: cpanel ${CPANEL_USERNAME}:${CPANEL_API_TOKEN}" \
            "https://${CPANEL_DOMAIN}:2083/execute/VersionControl/update?repository_root=%2Fhome%2F${CPANEL_USERNAME}%2Frepositories%2FConstruction_ERP")

          echo "HTTP status: $RESPONSE"
          cat /tmp/cpanel_response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "Deployment failed with HTTP $RESPONSE"
            exit 1
          fi

          ERRORS=$(cat /tmp/cpanel_response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('errors',''))")
          if [ -n "$ERRORS" ] && [ "$ERRORS" != "None" ] && [ "$ERRORS" != "[]" ]; then
            echo "CPanel reported errors: $ERRORS"
            exit 1
          fi

          echo "Deployment triggered successfully."
