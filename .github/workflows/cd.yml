name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [ "main" ]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
      CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
      CPANEL_DOMAIN: ${{ secrets.CPANEL_DOMAIN }}
      REPO_ROOT: /home/natanewn/repositories/Construction_ERP

    steps:
      - name: Trigger CPanel deployment
        run: |
          echo "Connecting to: https://${CPANEL_DOMAIN}:2083"

          # Try port 2083 first, fall back to 2096
          for PORT in 2083 2096 443; do
            echo "Trying port ${PORT}..."
            RESPONSE=$(curl -sk -o /tmp/deploy_response.json -w "%{http_code}" \
              --connect-timeout 15 \
              -X POST \
              -H "Authorization: cpanel ${CPANEL_USERNAME}:${CPANEL_API_TOKEN}" \
              -d "repository_root=${REPO_ROOT}" \
              "https://${CPANEL_DOMAIN}:${PORT}/execute/VersionControlDeployment/create") || true

            echo "Port ${PORT} HTTP status: $RESPONSE"
            cat /tmp/deploy_response.json || true

            if [ "$RESPONSE" = "200" ]; then
              echo "Deployment triggered successfully on port ${PORT}."
              exit 0
            fi
          done

          echo "All ports failed. Deployment could not be triggered."
          exit 1
