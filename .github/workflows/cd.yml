name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [ "main" ]
    types:
      - completed

# Deployment is handled by a server-side cron job that polls GitHub
# every 5 minutes. The cPanel API ports (2083/2096) are firewalled
# from external networks including GitHub Actions runners.
jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed - server cron will deploy within 5 minutes
        run: echo "CI passed. The server cron job will detect and deploy this commit within 5 minutes."
